 ✅</div><div class=\"val\">City Hall</div><div class=\"sub\">Tower 09:50 + tour 11:00</div></div><div class=\"cell\"><div class=\"lbl\">Vinyl</div><div class=\"val\">Nostalgipalatset</div><div class=\"sub\">S:t Eriksgatan 101</div></div><div class=\"cell\"><div class=\"lbl\">Concert</div><div class=\"val\">SOAD · 18:30+</div><div class=\"sub\">Strawberry Arena</div></div><div class=\"cell\"><div class=\"lbl\">Rest</div><div class=\"val\">15:15 – 17:00</div><div class=\"sub\">Critical · pre-show</div></div></section><section class=\"hero\"><div class=\"title-block\"><div class=\"kicker\">— Chapter Four —</div><h1>Tower views, vinyl crates, then <em>System of a Down</em>.</h1><p class=\"lede\">City Hall's blue and gold halls in the morning, KTH's modernist campus mid-day, vinyl crates and a Mediterranean lunch near Odenplan, then the Pendeltåg north for the loudest night of the trip.</p></div><div class=\"route\"><div class=\"route-lbl\"><span>Route · Schematic</span><span>↳ Day 4</span></div><div class=\"stops\"><div class=\"pin teal\">🏛</div><div class=\"seg solid\"></div><div class=\"pin teal\">⌬</div><div class=\"seg solid\"></div><div class=\"pin plum\">♪</div><div class=\"seg solid\"></div><div class=\"pin gold\">⌂</div><div class=\"seg\"></div><div class=\"pin plum\">⚡</div></div><div class=\"stop-labels\"><span>City&nbsp;Hall</span><span>KTH</span><span>Nostalgi­palatset</span><span>Hotel rest</span><span>SOAD</span></div></div></section><div class=\"notes\"><div class=\"ico\">✱</div><div class=\"txt\"><span>Both booked ✅</span><b>City Hall tower (09:50) and building tour (11:00) are both booked.</b> 3 tickets each — just arrive 5 min before each. Bonus: <b>Rådhuset metro station</b> has dramatic cave-like red rock walls — pause for photos on your way in. </div></div><div class=\"section-title\">Day Plan <span class=\"count\">· 14 stops · 09:15 – post-show</span></div><div class=\"timeline\"><div class=\"stop-row cat-transit\"><div class=\"time\">09:15</div><div class=\"body\"><div class=\"name\">Depart Odenplan <span class=\"tag\">Transit</span></div><div class=\"desc\">Take Green Line to T-Centralen, transfer to Blue Line to Rådhuset (3 stops total, ~12 min), or walk (~22 min).</div></div></div><div class=\"stop-row cat-tower\"><div class=\"time\">09:50<br>10:35</div><div class=\"body\"><div class=\"name\">City Hall Tower · self-guided ✅ <span class=\"tag\">Booked</span></div><div class=\"desc\"><b>Booked 09:50 slot — arrive 5 min early; tower first today.</b> Elevator halfway, then 365 stairs. Small Tower Museum halfway up. <b>Spectacular 360° view</b> at the top — best in Stockholm.</div></div></div><div class=\"stop-row cat-food\"><div class=\"time\">10:35<br>11:00</div><div class=\"body\"><div class=\"name\">Espresso time <span class=\"tag\">Break</span></div><div class=\"desc\">No rush before the tour — coffee at the City Hall café or relax in Stadshusparken with waterfront views over Riddarfjärden.</div></div></div><div class=\"stop-row cat-tower\"><div class=\"time\">11:00<br>11:45</div><div class=\"body\"><div class=\"name\">City Hall · building tour ✅ <span class=\"tag\">Booked</span></div><div class=\"desc\">Booked <b>11:00 English tour</b>: Blue Hall (Nobel banquet) and Golden Hall (18 million gold mosaic tiles). 45 min with an English guide.</div></div></div><div class=\"stop-row cat-transit\"><div class=\"time\">11:45<br>12:00</div><div class=\"body\"><div class=\"name\">Metro · Rådhuset → KTH <span class=\"tag\">Transit</span></div><div class=\"desc\">Green to T-Centralen, change to Red, off at Tekniska Högskolan. ~15 min including transfer.</div></div></div><div class=\"stop-row cat-sight\"><div class=\"time\">12:00<br>13:00</div><div class=\"body\"><div class=\"name\">KTH Royal Institute <span class=\"tag\">Sight</span></div><div class=\"desc\"><b>KTH Library</b> (Osquars backe 25) — striking glass and brick. Clock tower in the 1917 main courtyard by Erik Lallerstedt. <b>R1 Reactor Hall</b>: Sweden's first nuclear reactor ran 25 m below this campus, 1954–1970. Hall still exists but tours aren't walk-in — worth reading about beforehand.</div></div></div><div class=\"stop-row cat-transit\"><div class=\"time\">13:00<br>13:15</div><div class=\"body\"><div class=\"name\">Metro → Sankt Eriksplan <span class=\"tag\">Transit</span></div><div class=\"desc\">Red to T-Centralen, Green back toward Odenplan. ~15 min, then a short walk to S:t Eriksgatan 101.</div></div></div><div class=\"stop-row cat-music\"><div class=\"time\">13:15<br>13:45</div><div class=\"body\"><div class=\"name\">Nostalgipalatset · vinyl <span class=\"tag\">Vinyl</span></div><div class=\"desc\">Possibly Sweden's best-stocked vinyl shop. Rock, prog, punk, metal, jazz. Knowledgeable staff, fair prices.</div><div class=\"addr\">↳ S:t Eriksgatan 101</div></div></div><div class=\"stop-row cat-food\"><div class=\"time\">14:00<br>15:00</div><div class=\"body\"><div class=\"name\">Cravings Mediterranean · lunch <span class=\"tag\">Food</span></div><div class=\"desc\">Mediterranean sharing plates by Odenplan (Mykonos is closed Mon). Allergen-aware — say 'Inga nötter, ingen fisk'.</div><div class=\"addr\">↳ Upplandsgatan 73</div></div></div><div class=\"stop-row cat-sight\"><div class=\"time\">15:00<br>15:15</div><div class=\"body\"><div class=\"name\">Walk back to hotel <span class=\"tag\">Walk</span></div><div class=\"desc\">~5 min back to ibis Styles Odenplan.</div></div></div><div class=\"stop-row cat-rest\"><div class=\"time\">15:15<br>17:00</div><div class=\"body\"><div class=\"name\">Rest at hotel <span class=\"tag\">Recharge</span></div><div class=\"desc\">Critical rest before tonight's metal show. Recharge, freshen up, get ready.</div></div></div><div class=\"stop-row cat-transit\"><div class=\"time\">17:00<br>17:30</div><div class=\"body\"><div class=\"name\">Pendeltåg → Solna <span class=\"tag\">Transit</span></div><div class=\"desc\">From Odenplan Citybanan toward Märsta/Uppsala — only ~12 min.</div></div></div><div class=\"stop-row cat-food\"><div class=\"time\">17:30<br>18:15</div><div class=\"body\"><div class=\"name\">Grekiska Grill &amp; Bar <span class=\"tag\">Food</span></div><div class=\"desc\">Light pre-show souvlaki at Arenastaden. <b>Don't overeat</b> before a metal show. Walk-in is fine, but the concert crowd surges it — book ahead or arrive promptly. Alt: Mall of Scandinavia food court.</div><div class=\"addr\">↳ Evenemangsgatan 18</div></div></div><div class=\"stop-row cat-concert\"><div class=\"time\">18:30+</div><div class=\"body\"><div class=\"name\">System of a Down <span class=\"tag\">Booked</span></div><div class=\"desc\"><b>Doors 18:30.</b> Acid Bath → Queens of the Stone Age → System of a Down — head in promptly. ~5 min walk from Grekiska. <b>Bring ear protection</b> (Apoteket or Clas Ohlson). Check the last Pendeltåg back before the show starts.</div></div></div><div class=\"stop-row cat-transit\"><div class=\"time\">Post<br>show</div><div class=\"body\"><div class=\"name\">Pendeltåg → Odenplan <span class=\"tag\">Transit</span></div><div class=\"desc\">Walk to Solna station (~5 min), Pendeltåg home (~12 min). Frequency drops late — have the SL app ready.</div></div></div></div><footer class=\"foot\"><div class=\"col\">Stockholm · 59°20′ N · 18°04′ E</div><div class=\"stamp\">Day 04 / 06<small>STOCKHOLM · MMXXVI</small></div><div class=\"col right\">365 stairs · 1 vinyl crate · 1 SOAD</div></footer></article></body></html>"</script></body></html>
